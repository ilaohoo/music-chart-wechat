name: Weekly Music Chart Push

on:
  # 定时触发：每周六上午10:00（北京时间）
  schedule:
    - cron: '0 2 * * 6'  # UTC时间2:00 = 北京时间10:00
  
  # 手动触发（可以在GitHub页面上手动运行）
  workflow_dispatch:

jobs:
  push-music-chart:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4
      
      - name: 运行榜单抓取脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python music_chart.py
      
      - name: 运行点评生成脚本
        run: |
          python music_review.py
      
      - name: 上传生成的文案附件
        uses: actions/upload-artifact@v4
        with:
          name: music-review-output
          path: |
            music_review_*.json
            music_chart_*.json
      
      - name: 上传运行日志（可选）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs
          path: |
            *.log
